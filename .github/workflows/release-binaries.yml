name: Release Binaries

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os_name }} binary
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            os_name: linux
            asset_name: vault-linuxV1
          - runner: macos-latest
            os_name: macos
            asset_name: vault-macosV1
          - runner: windows-latest
            os_name: windows
            asset_name: vault-windowsV1.exe

    steps:
      # ---------------------------------------------------
      # Checkout repo
      # ---------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------
      # Setup Python
      # ---------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------
      # Install dependencies (CRITICAL FIX)
      # ---------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------------------------------------------------
      # Verify critical imports BEFORE build
      # (THIS PREVENTS YOUR argon2 crash)
      # ---------------------------------------------------
      - name: Verify dependencies
        run: |
          python -c "import supabase; print('supabase OK')"
          python -c "import argon2; print('argon2 OK')"
          python -c "import cryptography; print('cryptography OK')"
          python -c "import requests; print('requests OK')"

      # ---------------------------------------------------
      # Build executable
      # ---------------------------------------------------
      - name: Build executable
        run: pyinstaller vault.spec --noconfirm --clean

      # ---------------------------------------------------
      # Verify build output (Linux / macOS)
      # ---------------------------------------------------
      - name: Verify artifact exists (Linux / macOS)
        if: runner.os != 'Windows'
        run: test -f "dist/${{ matrix.asset_name }}"

      # ---------------------------------------------------
      # Verify build output (Windows)
      # ---------------------------------------------------
      - name: Verify artifact exists (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/${{ matrix.asset_name }}")) {
            throw "Expected artifact dist/${{ matrix.asset_name }} not found."
          }

      # ---------------------------------------------------
      # Generate checksum (Linux / macOS)
      # ---------------------------------------------------
      - name: Write checksum (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${{ matrix.asset_name }}" | awk '{print $1}' > "dist/${{ matrix.asset_name }}.sha256"
          else
            shasum -a 256 "dist/${{ matrix.asset_name }}" | awk '{print $1}' > "dist/${{ matrix.asset_name }}.sha256"
          fi

      # ---------------------------------------------------
      # Generate checksum (Windows)
      # ---------------------------------------------------
      - name: Write checksum (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash -Algorithm SHA256 -Path "dist/${{ matrix.asset_name }}").Hash.ToLowerInvariant()
          Set-Content -Path "dist/${{ matrix.asset_name }}.sha256" -Value $hash -NoNewline

      # ---------------------------------------------------
      # Upload artifacts (manual runs only)
      # ---------------------------------------------------
      - name: Upload workflow artifacts
        if: github.event_name != 'release'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os_name }}-release-assets
          path: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256

      # ---------------------------------------------------
      # Upload GitHub Release assets
      # ---------------------------------------------------
      - name: Upload release assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/${{ matrix.asset_name }}
            dist/${{ matrix.asset_name }}.sha256